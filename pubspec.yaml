name: downloader_media
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  archive: ^4.0.9
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  http: ^1.6.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  url_launcher: ^6.3.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.1

flutter:
  uses-material-design: true

msix_config:
  display_name: DownloaderMedia
  publisher_display_name: DownloaderMedia_JBRM
  identity_name: com.downloaddermedia.jbrm
  publisher: CN=DownloaderMedia_JBRM
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: internetClient, internetClientServer, privateNetworkClientServer
  enable_at_startup: true
  startup_task_id: DownloaderMediaStartup
